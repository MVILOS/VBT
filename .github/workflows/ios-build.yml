name: iOS Build & Test

# Jedyny sposób weryfikacji, że kod w ios/ się kompiluje, gdy pracuje się bez
# lokalnego Maca — xcodebuild wymaga macOS, więc runner musi być macos-latest.
on:
  push:
    branches: [main]
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"
  workflow_dispatch: {}

jobs:
  build-and-test:
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios/VBT
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # Xcode 16 na runnerach GitHub nie preinstaluje symulatora "iPhone 15 Pro" domyślnie
      # (obraz przesunął się na linię iPhone 16) — CI używa więc dowolnego dostępnego
      # symulatora iOS tylko po to, żeby zweryfikować kompilację/testy jednostkowe.
      # Realny test UI/BLE na iPhone 15 Pro i tak wymaga fizycznego urządzenia (patrz README).
      - name: Pick available iOS Simulator
        id: sim
        run: |
          NAME=$(xcrun simctl list devices available -j \
            | python3 -c "import json,sys; data=json.load(sys.stdin)['devices']; names=[d['name'] for runtime in data for d in data[runtime] if d.get('isAvailable') and 'iPhone' in d['name']]; print(names[0] if names else '')")
          if [ -z "$NAME" ]; then echo "No iPhone simulator found" >&2; exit 1; fi
          echo "Using simulator: $NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Build (Debug)
        run: |
          xcodebuild build \
            -project VBT.xcodeproj \
            -scheme VBT \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }}" \
            CODE_SIGNING_ALLOWED=NO

      - name: Unit tests
        run: |
          xcodebuild test \
            -project VBT.xcodeproj \
            -scheme VBT \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }}" \
            CODE_SIGNING_ALLOWED=NO
