name: iOS Build & Test

# Jedyny sposób weryfikacji, że kod w ios/ się kompiluje, gdy pracuje się bez
# lokalnego Maca — xcodebuild wymaga macOS, więc runner musi być macos-latest.
on:
  push:
    branches: [main]
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"
  workflow_dispatch: {}

jobs:
  build-and-test:
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios/VBT
    steps:
      - uses: actions/checkout@v4

      # Celowo NIE wymuszamy `xcode-select` na konkretną wersję: na runnerach GitHub
      # tylko domyślnie wybrany Xcode ma podpięte zainstalowane runtime'y symulatora
      # ("xcode-select -s" na inną wersję zostawiało tylko "My Mac" i placeholdery
      # w `-showdestinations` - żadnego realnego symulatora).
      - name: Xcode version in use
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # `generic/platform=iOS Simulator` kompiluje dla SDK symulatora bez potrzeby
      # bootowania/posiadania konkretnego urządzenia - to jedyny destination, który nie
      # zależy od tego, jakie konkretne symulatory są akurat zainstalowane na runnerze.
      - name: Build (Debug, generic iOS Simulator)
        run: |
          xcodebuild build \
            -project VBT.xcodeproj \
            -scheme VBT \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO

      # Testy jednostkowe muszą jednak wystartować na konkretnym, uruchamialnym
      # symulatorze - bierzemy pierwszy dostępny z tego, co faktycznie zaakceptuje
      # xcodebuild dla tego schematu (Placeholdery w -showdestinations to nie
      # uruchamialne urządzenia, więc je odrzucamy).
      - name: Pick a runnable simulator for tests
        id: sim
        run: |
          xcodebuild -showdestinations -project VBT.xcodeproj -scheme VBT CODE_SIGNING_ALLOWED=NO 2>&1 | tee destinations.txt
          UDID=$(grep "platform:iOS Simulator, id:" destinations.txt \
            | grep -v "Placeholder" \
            | head -1 \
            | sed -E 's/.*id:([^,]*),.*/\1/')
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          if [ -z "$UDID" ]; then
            echo "::warning::Brak zainstalowanego, uruchamialnego symulatora iOS na tym runnerze - pomijam testy jednostkowe (kompilacja i tak jest zweryfikowana krokiem Build powyżej)."
          else
            echo "Using simulator UDID: $UDID"
          fi

      - name: Unit tests
        if: steps.sim.outputs.udid != ''
        run: |
          xcodebuild test \
            -project VBT.xcodeproj \
            -scheme VBT \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            CODE_SIGNING_ALLOWED=NO
