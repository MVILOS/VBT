name: iOS Build & Test

# Jedyny sposób weryfikacji, że kod w ios/ się kompiluje, gdy pracuje się bez
# lokalnego Maca — xcodebuild wymaga macOS, więc runner musi być macos-latest.
on:
  push:
    branches: [main]
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"
  workflow_dispatch: {}

jobs:
  build-and-test:
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios/VBT
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # Xcode 16 na runnerach GitHub nie preinstaluje symulatora "iPhone 15 Pro" domyślnie
      # (obraz przesunął się na linię iPhone 16) — CI używa więc dowolnego dostępnego
      # symulatora iOS tylko po to, żeby zweryfikować kompilację/testy jednostkowe.
      # Realny test UI/BLE na iPhone 15 Pro i tak wymaga fizycznego urządzenia (patrz README).
      # `simctl list devices available` i to, co xcodebuild faktycznie akceptuje jako
      # destination dla tego schematu, to dwie różne listy (widzieliśmy UDID z simctl
      # odrzucany przez xcodebuild jako "unable to find a destination"). Pytamy więc
      # bezpośrednio xcodebuild -showdestinations o listę, którą sam uzna za poprawną.
      - name: Show and pick a valid destination
        id: sim
        run: |
          xcodebuild -showdestinations -project VBT.xcodeproj -scheme VBT CODE_SIGNING_ALLOWED=NO 2>&1 | tee destinations.txt
          # Placeholdery ("Any iOS Simulator Device") mają w id literalne słowo "Placeholder"
          # i nie są uruchamialnym urządzeniem — odrzucamy je i bierzemy pierwsze realne.
          UDID=$(grep "platform:iOS Simulator, id:" destinations.txt \
            | grep -v "Placeholder" \
            | head -1 \
            | sed -E 's/.*id:([^,]*),.*/\1/')
          if [ -z "$UDID" ]; then echo "No concrete iOS Simulator destination found" >&2; exit 1; fi
          echo "Using simulator UDID: $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build (Debug)
        run: |
          xcodebuild build \
            -project VBT.xcodeproj \
            -scheme VBT \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            CODE_SIGNING_ALLOWED=NO

      - name: Unit tests
        run: |
          xcodebuild test \
            -project VBT.xcodeproj \
            -scheme VBT \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            CODE_SIGNING_ALLOWED=NO
