name: iOS Build & Test

# Jedyny sposób weryfikacji, że kod w ios/ się kompiluje, gdy pracuje się bez
# lokalnego Maca — xcodebuild wymaga macOS, więc runner musi być macos-latest.
on:
  push:
    branches: [main]
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"
  workflow_dispatch: {}

jobs:
  build-and-test:
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios/VBT
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Debug, iPhone 15 Pro simulator)
        run: |
          xcodebuild build \
            -project VBT.xcodeproj \
            -scheme VBT \
            -destination "platform=iOS Simulator,name=iPhone 15 Pro" \
            CODE_SIGNING_ALLOWED=NO

      - name: Unit tests (iPhone 15 Pro simulator)
        run: |
          xcodebuild test \
            -project VBT.xcodeproj \
            -scheme VBT \
            -destination "platform=iOS Simulator,name=iPhone 15 Pro" \
            CODE_SIGNING_ALLOWED=NO
