; PlatformIO Project Configuration File
;
; Urządzenie VBT (Velocity Based Training) - ESP32-C3 SuperMini
; v2.0.0 - BLE Mode
; Kompilacja i upload: pio run --target upload
; Monitor Serial: pio device monitor

[env:esp32-c3-supermini]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

; UWAGA: biblioteka ESP32Encoder USUNIĘTA - jej tryb attachFullQuad wymaga
; sprzętowego PCNT, którego ESP32-C3 nie ma (undefined reference przy
; linkowaniu). Zastąpiona własnym dekoderem kwadratury w src/quad_encoder.*
; (przerwania GPIO, zachowuje tę samą rozdzielczość 4x co PCNT).

; Opcje kompilacji
build_flags =
    -D CORE_DEBUG_LEVEL=3
    ; ESP32-C3 SuperMini ma natywny port USB-CDC (brak osobnego mostka
    ; USB-UART) - Serial musi iść przez USB-CDC, inaczej monitor będzie pusty
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1

; Monitor Serial
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Upload settings
upload_speed = 115200
; ESP32-C3 SuperMini z natywnym USB-CDC zwykle pojawia się jako /dev/ttyACM0,
; nie /dev/ttyUSB0 (to była nazwa dla mostka UART klasycznego ESP32) -
; zweryfikuj przez `ls /dev/ttyACM* /dev/ttyUSB*` po podłączeniu płytki
upload_port = /dev/ttyACM0
