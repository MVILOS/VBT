; PlatformIO Project Configuration File
;
; Urządzenie VBT (Velocity Based Training) - ESP32
; v2.0.0 - BLE Mode
; Kompilacja i upload: pio run --target upload
; Monitor Serial: pio device monitor

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Biblioteki wymagane
lib_deps =
    madhephaestus/ESP32Encoder @ ^0.10.2

; Opcje kompilacji
build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D ARDUINO_USB_CDC_ON_BOOT=0

; Monitor Serial
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Upload settings
upload_speed = 921600
